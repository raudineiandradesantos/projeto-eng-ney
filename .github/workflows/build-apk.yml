name: Build Android APK (Release)

on:
  push:
    branches: [main, expo-migration]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Download gradle-wrapper.jar
        working-directory: android/gradle/wrapper
        run: |
          curl -fSL -o gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar

      - name: Remove Windows-only Java home from gradle.properties
        run: sed -i '/org\.gradle\.java\.home/d' android/gradle.properties

      - name: Restore release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/engney-release.keystore

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties << 'EOF'
          storeFile=engney-release.keystore
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          EOF

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: engney-rdo-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
