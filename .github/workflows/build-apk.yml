name: Build Android APK (React Native)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: rn-app/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('rn-app/package-lock.json') }}

      - name: Install dependencies
        working-directory: rn-app
        run: npm install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('rn-app/android/**/*.gradle*') }}

      - name: Write google-services.json
        working-directory: rn-app
        run: echo "$GOOGLE_JSON" > android/app/google-services.json
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Make gradlew executable
        working-directory: rn-app
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: rn-app
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EngNeyRDO-debug
          path: rn-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
