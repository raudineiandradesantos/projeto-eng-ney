name: Build Android APK (React Native)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node deps
        working-directory: rn-app
        run: npm install

      - name: Initialize RN Android directory
        working-directory: rn-app
        run: |
          npx react-native@0.73.6 init EngNeyRDO --skip-install --directory _scaffold
          mv _scaffold/android ./android
          rm -rf _scaffold

      - name: Copy app source into RN project
        working-directory: rn-app
        run: |
          sed -i "s/EngNeyRDO/EngNeyRDO/g" android/app/src/main/res/values/strings.xml

      - name: Write google-services.json
        working-directory: rn-app
        run: |
          echo $GOOGLE_JSON > android/app/google-services.json
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Make gradlew executable
        working-directory: rn-app
        run: chmod +x android/gradlew

      - name: Assemble debug APK
        working-directory: rn-app
        run: cd android && ./gradlew assembleDebug --no-daemon -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EngNeyRDO-debug
          path: rn-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
