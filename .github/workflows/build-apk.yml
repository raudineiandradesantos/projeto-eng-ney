name: Build Android APK (React Native)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: rn-app
        run: npm install

      - name: Make gradlew executable
        working-directory: rn-app/android
        run: chmod +x gradlew

      - name: Build Debug APK via React Native CLI
        working-directory: rn-app
        run: |
          npx react-native build-android --mode=debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smarthvac-debug
          path: rn-app/android/app/build/outputs/apk/debug/app-debug.apk
