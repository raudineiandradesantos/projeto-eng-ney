name: Build Android APK (React Native)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: rn-app
        run: npm install

      - name: Simplify react-native gradle-plugin settings
        working-directory: rn-app/node_modules/@react-native/gradle-plugin
        run: |
          echo 'rootProject.name = "react-native-gradle-plugin"' > settings.gradle.kts

      - name: Write settings.gradle
        working-directory: rn-app/android
        run: |
          echo "pluginManagement {" > settings.gradle
          echo '    includeBuild("../node_modules/@react-native/gradle-plugin")' >> settings.gradle
          echo "    repositories {" >> settings.gradle
          echo "        google()" >> settings.gradle
          echo "        mavenCentral()" >> settings.gradle
          echo "        gradlePluginPortal()" >> settings.gradle
          echo "    }" >> settings.gradle
          echo "}" >> settings.gradle
          echo "plugins {" >> settings.gradle
          echo '    id("com.facebook.react.settings")' >> settings.gradle
          echo "}" >> settings.gradle
          echo "extensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }" >> settings.gradle
          echo 'rootProject.name = "EngNeyRDO"' >> settings.gradle
          echo "include ':app'" >> settings.gradle
          cat settings.gradle

      - name: Download gradle-wrapper.jar
        working-directory: rn-app/android/gradle/wrapper
        run: |
          curl -fSL -o gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        working-directory: rn-app/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: rn-app/android
        run: ./gradlew assembleDebug --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smarthvac-debug
          path: rn-app/android/app/build/outputs/apk/debug/app-debug.apk
