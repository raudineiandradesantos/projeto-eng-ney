name: Build Android APK (React Native)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: rn-app
        run: npm install

      - name: Debug plugin structure
        working-directory: rn-app
        run: |
          echo "=== Checking @react-native/gradle-plugin ==="
          ls node_modules/@react-native/gradle-plugin/ || echo "PLUGIN NOT FOUND"
          ls node_modules/@react-native/gradle-plugin/settings.gradle 2>/dev/null && echo "settings.gradle EXISTS" || echo "settings.gradle MISSING"
          ls node_modules/@react-native/gradle-plugin/build.gradle 2>/dev/null && echo "build.gradle EXISTS" || echo "build.gradle MISSING"
          ls node_modules/@react-native/gradle-plugin/*.gradle 2>/dev/null || echo "no .gradle files at root"

      - name: Write settings.gradle
        working-directory: rn-app/android
        run: |
          PLUGIN="$(realpath ../node_modules/@react-native/gradle-plugin)"
          printf 'pluginManagement { includeBuild("%s"); repositories { google(); mavenCentral(); gradlePluginPortal() } }\nplugins { id("com.facebook.react.settings") }\nextensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }\nrootProject.name = "EngNeyRDO"\ninclude ":app"\nincludeBuild("%s")\n' "$PLUGIN" "$PLUGIN" > settings.gradle
          echo "=== settings.gradle ==="
          cat settings.gradle

      - name: Download gradle-wrapper.jar
        working-directory: rn-app/android/gradle/wrapper
        run: |
          curl -fSL -o gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        working-directory: rn-app/android
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('rn-app/android/**/*.gradle*') }}

      - name: Build Debug APK
        working-directory: rn-app/android
        run: ./gradlew assembleDebug --no-daemon -x lint --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: rn-app/android/app/build/outputs/apk/debug/app-debug.apk
