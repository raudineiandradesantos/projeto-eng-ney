name: Build Android APK (React Native)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: rn-app
        run: npm install

      - name: Build React Native Gradle Plugin
        working-directory: rn-app/node_modules/@react-native/gradle-plugin
        run: |
          mkdir -p gradle/wrapper
          curl -fSL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          ./gradlew assemble --no-daemon 2>&1 | tail -5

      - name: Install plugin to local Maven
        working-directory: rn-app/node_modules/@react-native/gradle-plugin
        run: |
          VERSION=$(cat package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          JAR="$(realpath build/libs/react-native-gradle-plugin.jar)"
          echo "Installing version: $VERSION, JAR: $JAR"
          mvn install:install-file \
            -Dfile="$JAR" \
            -DgroupId=com.facebook.react \
            -DartifactId=react-native-gradle-plugin \
            -Dversion="$VERSION" \
            -Dpackaging=jar \
            -DgeneratePom=true
          echo "=== Installed ==="
          find ~/.m2/repository/com/facebook/react -name "*.jar" 2>/dev/null

      - name: Write settings.gradle with mavenLocal
        working-directory: rn-app/android
        run: |
          VERSION=$(cat ../node_modules/@react-native/gradle-plugin/package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "Using version: $VERSION"
          printf 'pluginManagement {\n  repositories {\n    mavenLocal()\n    google()\n    mavenCentral()\n    gradlePluginPortal()\n  }\n  resolutionStrategy {\n    eachPlugin {\n      if (requested.id.id == "com.facebook.react.settings") {\n        useModule("com.facebook.react:react-native-gradle-plugin:%s")\n      }\n    }\n  }\n}\nplugins { id("com.facebook.react.settings") }\nextensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }\nrootProject.name = "EngNeyRDO"\ninclude ":app"\n' "$VERSION" > settings.gradle
          echo "=== settings.gradle ==="
          cat settings.gradle

      - name: Update build.gradle for mavenLocal
        working-directory: rn-app/android
        run: |
          sed -i 's/repositories {/repositories {\n        mavenLocal()/' build.gradle || true

      - name: Download gradle-wrapper.jar
        working-directory: rn-app/android/gradle/wrapper
        run: |
          curl -fSL -o gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        working-directory: rn-app/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: rn-app/android
        run: ./gradlew assembleDebug --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: rn-app/android/app/build/outputs/apk/debug/app-debug.apk
