name: Build Android APK (React Native)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: rn-app
        run: npm install

      - name: Build React Native Gradle Plugin
        working-directory: rn-app/node_modules/@react-native/gradle-plugin
        run: |
          mkdir -p gradle/wrapper
          curl -fSL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          ./gradlew assemble --no-daemon 2>&1 | tail -20
          echo "=== Plugin JARs ==="
          find build/libs -name "*.jar" 2>/dev/null || echo "No JARs found"

      - name: Create Gradle init script
        run: |
          mkdir -p ~/.gradle/init.d
          PLUGIN_JAR="$(find rn-app/node_modules/@react-native/gradle-plugin/build/libs -name "*.jar" | head -1)"
          echo "Plugin JAR: $PLUGIN_JAR"
          if [ -n "$PLUGIN_JAR" ]; then
            PLUGIN_JAR_ABS="$(realpath $PLUGIN_JAR)"
            cat > ~/.gradle/init.d/react-native.gradle << EOF
          initscript {
            dependencies {
              classpath files('${PLUGIN_JAR_ABS}')
            }
          }
          EOF
            echo "=== Init script ==="
            cat ~/.gradle/init.d/react-native.gradle
          else
            echo "ERROR: No plugin JAR found!"
          fi

      - name: Write settings.gradle
        working-directory: rn-app/android
        run: |
          PLUGIN="$(realpath ../node_modules/@react-native/gradle-plugin)"
          printf 'pluginManagement { includeBuild("%s") }\nplugins { id("com.facebook.react.settings") }\nextensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }\nrootProject.name = "EngNeyRDO"\ninclude ":app"\nincludeBuild("%s")\n' "$PLUGIN" "$PLUGIN" > settings.gradle

      - name: Download gradle-wrapper.jar
        working-directory: rn-app/android/gradle/wrapper
        run: |
          curl -fSL -o gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        working-directory: rn-app/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: rn-app/android
        run: ./gradlew assembleDebug --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: rn-app/android/app/build/outputs/apk/debug/app-debug.apk
