name: Build Android APK (React Native)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: rn-app
        run: npm install

      - name: Prepare plugin wrapper jar
        run: |
          mkdir -p rn-app/node_modules/@react-native/gradle-plugin/gradle/wrapper
          curl -fSL -o rn-app/node_modules/@react-native/gradle-plugin/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x rn-app/node_modules/@react-native/gradle-plugin/gradlew

      - name: Publish plugin to local Maven
        working-directory: rn-app/node_modules/@react-native/gradle-plugin
        run: |
          ./gradlew publishToMavenLocal --no-daemon 2>&1 | tail -10
          echo "=== Published artifacts ==="
          find ~/.m2/repository/com/facebook -name "*.jar" 2>/dev/null | head -10 || echo "Nothing in ~/.m2/com/facebook"

      - name: Write settings.gradle with mavenLocal
        working-directory: rn-app/android
        run: |
          VERSION=$(cat ../node_modules/@react-native/gradle-plugin/package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          printf 'pluginManagement {\n  repositories {\n    mavenLocal()\n    google()\n    mavenCentral()\n    gradlePluginPortal()\n  }\n}\nplugins { id("com.facebook.react.settings") version "%s" }\nextensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }\nrootProject.name = "EngNeyRDO"\ninclude ":app"\n' "$VERSION" > settings.gradle
          echo "=== settings.gradle ==="
          cat settings.gradle

      - name: Update build.gradle mavenLocal
        working-directory: rn-app/android
        run: |
          sed -i 's/repositories {/repositories {\n        mavenLocal()/' build.gradle
          echo "=== build.gradle repos ==="
          head -25 build.gradle

      - name: Download gradle-wrapper.jar
        working-directory: rn-app/android/gradle/wrapper
        run: |
          curl -fSL -o gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        working-directory: rn-app/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: rn-app/android
        run: ./gradlew assembleDebug --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: rn-app/android/app/build/outputs/apk/debug/app-debug.apk
